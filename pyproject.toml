[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "terminalvelocity"
version = "0.1.0"
description = "Terminal log viewer for Microsoft 365"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "httpx==0.28.1",
  "pydantic==2.10.6",
  "tenacity==9.0.0",
  "textual==8.2.7",
]

[project.optional-dependencies]
dev = [
  "pytest==8.3.4",
]

[project.scripts]
terminalvelocity = "terminalvelocity.__main__:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
