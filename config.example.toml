[app]
log_level = "INFO"

[database]
path = "data/terminalvelocity.db"

[cache]
raw_event_ttl_hours = 168
max_events = 50000

[auth]
tenant_id = "common"
authority_host = "https://login.microsoftonline.com"
default_scopes = ["https://graph.microsoft.com/.default"]

[auth.device_code]
enabled = true
client_id = "11111111-1111-1111-1111-111111111111"
scopes = [
  "https://graph.microsoft.com/AuditLog.Read.All",
  "https://graph.microsoft.com/Directory.Read.All",
]

[auth.client_credentials]
enabled = false
client_id = "22222222-2222-2222-2222-222222222222"
scopes = ["https://graph.microsoft.com/.default"]
client_secret = { env = "TERMINALVELOCITY_CLIENT_SECRET" }
# Alternatively:
# client_secret = { keyring = { service = "terminalvelocity", username = "m365-app-secret" } }

[providers.entra_id]
enabled = true
service = "graph"
settings = { endpoint = "https://graph.microsoft.com/v1.0/auditLogs/signIns" }

[providers.defender_xdr]
enabled = false
service = "defender"
settings = { endpoint = "https://api.security.microsoft.com/api/incidents" }
